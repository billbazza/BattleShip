<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 100" width="480" height="100">

  <rect width="480" height="100" fill="#0a0a0a"/>

  <g transform="translate(10, 8)">

    <!-- Hull -->
    <polygon points="0,52 14,38 90,38 100,52 90,58 10,58"
             fill="#ffffff"/>

    <!-- Waterline -->
    <rect x="2" y="54" width="96" height="4" rx="1" fill="#c41e3a"/>

    <!-- Superstructure -->
    <rect x="44" y="26" width="32" height="14" rx="1" fill="#dddddd"/>

    <!-- Bridge windows -->
    <rect x="48" y="29" width="6" height="6" rx="1" fill="#c41e3a"/>
    <rect x="57" y="29" width="6" height="6" rx="1" fill="#c41e3a"/>
    <rect x="66" y="29" width="6" height="6" rx="1" fill="#c41e3a"/>

    <!-- Gun turret base -->
    <circle cx="38" cy="32" r="7" fill="#cccccc"/>

    <!-- Dumbbell gun bar -->
    <rect x="2" y="30" width="36" height="4" rx="1" fill="#eeeeee"/>
    <!-- Rear weight plate -->
    <rect x="33" y="25" width="6" height="14" rx="2" fill="#cccccc"/>
    <!-- Front weight plate — red accent -->
    <rect x="0" y="26" width="6" height="12" rx="2" fill="#c41e3a"/>

    <!-- Mast -->
    <rect x="62" y="12" width="2" height="16" fill="#888888"/>
    <rect x="56" y="14" width="14" height="1.5" fill="#888888"/>

  </g>

  <!-- Wordmark -->
  <text x="128" y="52"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="34"
        font-weight="bold"
        fill="#ffffff"
        letter-spacing="5">BATTLESHIP</text>

  <rect x="128" y="62" width="340" height="2" fill="#c41e3a"/>

  <text x="129" y="80"
        font-family="Arial, Helvetica, sans-serif"
        font-size="10.5"
        fill="#555555"
        letter-spacing="3">MIDLIFE FITNESS RESET</text>

</svg>
