<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>%%title%%</title>
</head>
<body style="margin:0;padding:0;background-color:#eeebe4;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#eeebe4">
<tr><td align="center" style="padding:28px 16px 40px;">

  <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;">

    <!-- ── HEADER ─────────────────────────────────────────────────────────── -->
    <tr>
      <td bgcolor="#0a0a0a" style="padding:24px 44px 20px;background-color:#0a0a0a;text-align:center;">
        <img src="https://raw.githubusercontent.com/billbazza/BattleShip/main/brand/Midlife-fitness-reset.jpg"
             width="140" alt="Battleship Reset"
             style="display:block;margin:0 auto 10px;width:140px;max-width:140px;">
        <p style="margin:0;font-size:10px;color:#555555;letter-spacing:2.5px;text-transform:uppercase;">%%subtitle%%</p>
      </td>
    </tr>

    <!-- ── TITLE BAR ──────────────────────────────────────────────────────── -->
    <tr>
      <td bgcolor="#c41e3a" style="padding:14px 44px;background-color:#c41e3a;">
        <p style="margin:0;font-family:Georgia,serif;font-size:18px;color:#ffffff;font-weight:normal;">%%title%%</p>
      </td>
    </tr>

    <!-- ── BODY SECTIONS ──────────────────────────────────────────────────── -->
    %%sections%%

    <!-- ── FOOTER ─────────────────────────────────────────────────────────── -->
    <tr>
      <td bgcolor="#0a0a0a" style="padding:20px 44px;background-color:#0a0a0a;text-align:center;">
        <p style="margin:0;font-size:11px;color:#555555;letter-spacing:1px;">Battleship Autonomous Pipeline · %%date%%</p>
      </td>
    </tr>

  </table>
</td></tr>
</table>
</body>
</html>
